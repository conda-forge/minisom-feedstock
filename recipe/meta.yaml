{% set name = "minisom" %}
{% set version = "2.3.5" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: c4e65e0a6a50170c163e9c0408f77464871e7b3007ad0cd87e178cdaf3db2ce3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python
    - pip
  run:
    - python >=3.6
    - numpy >=1.16

test:
  imports:
    - minisom
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/JustGlowing/minisom
  summary: Minimalistic implementation of the Self Organizing Maps (SOM)
  license: MIT
  license_file: LICENSE
  description: |
    MiniSom is a minimalistic and Numpy based implementation of the Self Organizing Maps (SOM)
  doc_url: https://github.com/JustGlowing/minisom/tree/master/examples
  dev_url: https://github.com/simplejson/simplejson

extra:
  recipe-maintainers:
    - maclandrol

